type Student @table(key: "studentId") {
  studentId: String!
  firstName: String!
  lastName: String!
  email: String!
  department: String!
  program: String!
  yearOfStudy: Int!
  createdAt: Timestamp!
  bio: String
  profilePictureUrl: String
  contactNumber: String
}

type Group @table(key: "name") {
  name: String!
  description: String!
  groupType: String!
  createdAt: Timestamp!
  adminStudentId: Student!
  coverImageUrl: String
}

type Membership @table(key: ["student", "group"]) {
  student: Student!
  group: Group!
  joinedAt: Timestamp!
}

type Post @table {
  student: Student!
  content: String!
  createdAt: Timestamp!
  group: Group
  imageUrl: String
  documentUrl: String
}

type DirectMessage @table {
  sender: Student!
  receiver: Student!
  messageContent: String!
  sentAt: Timestamp! @default(expr: "request.time")
  imageUrl: String
  gifUrl: String
  audioUrl: String
  reactions: Any
  isEdited: Boolean @default(value: false)
  isDeleted: Boolean @default(value: false)
  replyTo: DirectMessage
}

type GroupMessage @table {
  sender: Student!
  group: Group!
  messageContent: String!
  sentAt: Timestamp! @default(expr: "request.time")
  imageUrl: String
  gifUrl: String
  audioUrl: String
  reactions: Any
  isEdited: Boolean @default(value: false)
  isDeleted: Boolean @default(value: false)
  replyTo: GroupMessage
}

type PublicMessage @table {
  sender: Student!
  messageContent: String!
  sentAt: Timestamp! @default(expr: "request.time")
  imageUrl: String
  gifUrl: String
  audioUrl: String
  reactions: Any
  isEdited: Boolean @default(value: false)
  isDeleted: Boolean @default(value: false)
  expiresAt: Timestamp!
}

type Comment @table {
  student: Student!
  post: Post!
  commentContent: String!
  createdAt: Timestamp!
}