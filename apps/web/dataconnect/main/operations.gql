# Public Message Operations

mutation SendPublicMessage(
  $senderId: String!,
  $messageContent: String!,
  $imageUrl: String,
  $blurHash: String,
  $gifUrl: String,
  $audioUrl: String,
  $expiresAt: Timestamp!
) {
  publicMessage_insert(data: {
    senderStudentId: $senderId,
    messageContent: $messageContent,
    imageUrl: $imageUrl,
    blurHash: $blurHash,
    gifUrl: $gifUrl,
    audioUrl: $audioUrl,
    expiresAt: $expiresAt
  })
}

query ListPublicMessages($now: Timestamp!) {
  publicMessages(
    where: { expiresAt: { gt: $now } },
    orderBy: [{ sentAt: ASC }]
  ) {
    id
    messageContent
    senderStudentId
    sender {
      firstName
      lastName
