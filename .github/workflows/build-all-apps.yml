name: Build and Release All Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Decoding google-services.json from Secrets..."
            echo $GOOGLE_SERVICES_JSON_BASE64 | base64 --decode > app/google-services.json
          fi

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding Keystore from Secrets..."
            echo $KEYSTORE_BASE64 | base64 --decode > app/release.keystore
          fi
          
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  windows-build:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows App
        working-directory: desktop
        run: npm run dist

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: desktop/dist/*.exe

  release:
    name: Create GitHub Release
    needs: [android-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          tag_name: v1.3.0-build-${{ github.run_number }}
          name: DYPU Connect v1.3.0 (Build #${{ github.run_number }})
          body: |
            ## 🚀 Dual Release: Android & Windows

            ### 📱 Android
            - Download `DYPU-Connect.apk` for your mobile device.
            - Ensure "Install from unknown sources" is enabled.

            ### 🪟 Windows
            - Download `DYPU-Connect-Setup.exe` for your desktop.
            - High-performance Electron wrapper for the full campus experience.

            ---
            *Built automatically by GitHub Actions.*
