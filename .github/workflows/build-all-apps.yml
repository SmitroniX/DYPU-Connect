name: Build and Release All Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo $GOOGLE_SERVICES_JSON_BASE64 | base64 --decode > app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 missing. Build might fail."
          fi
          
          chmod +x ./gradlew
          # Build unsigned APK if secrets are missing
          ./gradlew assembleRelease || ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk

  windows-build:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows App
        working-directory: desktop
        run: npm run dist

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: desktop/dist/*.exe

  release:
    name: Create GitHub Release
    needs: [android-build, windows-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          tag_name: build-${{ github.run_number }}
          name: DYPU Connect Release #${{ github.run_number }}
          body: |
            ## 🚀 Latest Build Assets
            
            Find the latest automated builds below:
            - **Android:** `.apk` file (may be debug/unsigned if keys aren't set)
            - **Windows:** `.exe` installer (Electron wrapper)
            
            ---
            *Built by GitHub Actions.*
