name: Build Windows Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows App
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dypu-connect-windows
          path: desktop/dist/*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          tag_name: desktop-build-${{ github.run_number }}
          name: Desktop Build #${{ github.run_number }}
          body: |
            ## 🪟 Windows Desktop Update
            
            Download the latest `DYPU-Connect-Setup.exe` below to install the app on your computer.
            
            ---
            *Built automatically by GitHub Actions.*
