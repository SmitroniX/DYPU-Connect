name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Configure Firebase (google-services.json)
        working-directory: android/app
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Decoding google-services.json from Secrets..."
            echo $GOOGLE_SERVICES_JSON_BASE64 | base64 --decode > google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 is not set. The build might fail if Firebase is strictly required."
            # Create a mock file just to let Gradle configure if needed
            echo "{}" > google-services.json
          fi

      - name: Configure Keystore
        working-directory: android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding Keystore from Secrets..."
            echo $KEYSTORE_BASE64 | base64 --decode > release.keystore
          fi

      - name: Build APK (Release/Debug)
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          
          # Attempt to build Release first, fallback to Debug if signing config is missing
          if [ -f "app/release.keystore" ]; then
            echo "Building Release APK..."
            ./gradlew assembleRelease
          else
            echo "No keystore found. Building Debug APK instead..."
            ./gradlew assembleDebug
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dypu-connect-android
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          tag_name: android-build-${{ github.run_number }}
          name: Android Build #${{ github.run_number }}
          body: |
            ## 📱 Android App Update
            
            Download the latest `.apk` file below to install on your Android device.
            *Note: If signing keys are not provided in Secrets, this will be a debug build.*
